spring.application.name=employee-management-api

# Server
server.port=8080

# Datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/employee_db
spring.datasource.username=admin
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging (Logback config file)
logging.config=classpath:logback-spring.xml
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.com.example.employee=DEBUG

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis

spring.data.mongodb.uri=mongodb://localhost:27017/employee_audit_db
spring.data.mongodb.uuid-representation=standard

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=audit-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

management.endpoints.web.exposure.include=health,metrics,prometheus